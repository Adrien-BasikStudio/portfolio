<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="dotsPattern" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="1.6" fill="#3d9eff" opacity="0.22"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3d9eff" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#3d9eff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#3d9eff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d0d0d" stop-opacity="0.85"/>
      <stop offset="0.55" stop-color="#0d0d0d" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0d0d0d" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0d0d"/>
  <rect width="1200" height="630" fill="url(#dotsPattern)"/>

  <!-- Signature glow bottom-right -->
  <circle cx="1020" cy="470" r="220" fill="url(#glow)"/>
  <circle cx="1020" cy="470" r="32" fill="#3d9eff"/>
  <circle cx="1020" cy="470" r="60" fill="none" stroke="#3d9eff" stroke-width="1.5" opacity="0.5"/>
  <circle cx="1020" cy="470" r="92" fill="none" stroke="#3d9eff" stroke-width="1" opacity="0.3"/>

  <!-- Vignette gauche pour bien lire le texte -->
  <rect width="800" height="630" fill="url(#vignette)"/>

  <!-- Texte -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
    <!-- Label small -->
    <text x="80" y="190" font-size="20" font-weight="600" fill="#6fb6ff" letter-spacing="6">PORTFOLIO</text>

    <!-- Title -->
    <text x="80" y="296" font-size="88" font-weight="800" fill="#f0f0f0" letter-spacing="-2">Adrien Ciampone</text>

    <!-- Accent line -->
    <rect x="80" y="328" width="120" height="4" fill="#3d9eff"/>

    <!-- Tagline -->
    <text x="80" y="402" font-size="34" font-weight="500" fill="#d4d4d4">Création &amp; développement digital</text>
    <text x="80" y="450" font-size="28" font-weight="400" fill="#9aa3ad">Web · Formation · Technologie</text>

    <!-- URL footer -->
    <text x="80" y="570" font-size="20" font-weight="600" fill="#6fb6ff" letter-spacing="2">adrien-ciampone.basik-studio.ch</text>
  </g>
</svg>
